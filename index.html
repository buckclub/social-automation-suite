<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Social Automation Suite</title>
    <meta name="description" content="Open-source suite for end-to-end short-form content automation: Reddit-story reels with TTS + captions, Clip Maker for long-form → Shorts, text posts for tweets/comments/community posts, background-queue social-copy generation, and optional auto-publishing to YouTube Shorts, TikTok, Instagram Reels and Snapchat." />
    <meta name="author" content="Faheem Alvi" />
    <meta name="keywords" content="social automation, short-form video, YouTube Shorts, TikTok, Instagram Reels, AI content generation, clip maker, TTS video, FFmpeg captions, faceless YouTube, Reddit automation, text post generator" />

    <meta property="og:title" content="Social Automation Suite" />
    <meta property="og:description" content="End-to-end short-form content automation — reels, clips, text posts, social copy — with TTS, FFmpeg, AI generation, and optional auto publishing." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <!-- Apply saved theme BEFORE React mounts to avoid a flash of the
         wrong palette on first paint. Mirrors the ThemeToggle hook. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ui-theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
